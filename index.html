<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>my budget · 主编的账簿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #1C1B18;
      --paper:    #F5F0E8;
      --ink:      #F5F0E8;
      --muted:    #9C9890;
      --hint:     #6B6762;
      --gold:     #C4944A;
      --gold-dim: rgba(196,148,74,0.12);
      --warn:     #D8553A;
      --warn-dim: rgba(216,85,58,0.1);
      --line:     rgba(245,240,232,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 28px 20px 0;
    }

    /* ── Typography ── */
    .serif {
      font-family: 'DM Serif Display', serif;
      font-variant-numeric: tabular-nums;
    }
    .num  {
      font-family: 'DM Serif Display', serif;
      font-variant-numeric: tabular-nums;
    }

    /* ── Tab pages ── */
    .tab-page { display: none; padding-bottom: 80px; }
    .tab-page.active { display: block; }

    /* ── Home: Header ── */
    .home-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 40px;
    }
    .brand {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .brand em { font-style: italic; color: var(--gold); }
    .today-date {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--hint);
      text-transform: uppercase;
    }

    /* ── Month picker ── */
    .month-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 28px;
    }
    .month-picker button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--hint);
      font-size: 18px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
      font-family: 'DM Serif Display', serif;
    }
    .month-picker button:hover { color: var(--gold); }
    .month-picker-label {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: var(--ink);
      min-width: 60px;
      text-align: center;
      letter-spacing: 0.02em;
    }

    /* ── Hero ── */
    .hero {
      margin-bottom: 32px;
    }
    .hero-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: var(--hint);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .hero-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 72px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -1.5px;
      color: var(--ink);
      margin-bottom: 16px;
    }
    .hero-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }
    .hero .progress-track {
      height: 1px;
      background: var(--line);
      border-radius: 0;
      overflow: visible;
      position: relative;
    }
    .hero .progress-fill {
      height: 2px;
      border-radius: 0;
      background: var(--gold);
      position: absolute;
      top: -0.5px;
      left: 0;
      transition: width 0.6s ease;
    }

    /* ── Stats row ── */
    .stats-row {
      display: flex;
      gap: 0;
      margin-bottom: 48px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 20px 0;
    }
    .stat-card {
      flex: 1;
      text-align: center;
      background: none;
      border-radius: 0;
      padding: 0;
      border-right: 1px solid var(--line);
    }
    .stat-card:last-child { border-right: none; }
    .stat-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--hint);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--ink);
      letter-spacing: 0;
    }
    .stat-extra {
      font-size: 10px;
      color: var(--gold);
      margin-top: 4px;
    }

    /* ── Banners ── */
    .banners { margin-bottom: 32px; }
    .banner {
      background: var(--gold-dim);
      border-left: 2px solid var(--gold);
      border-radius: 0;
      padding: 14px 16px;
      font-size: 12px;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
      line-height: 1.5;
      color: var(--gold);
    }
    .banner.warn {
      background: var(--warn-dim);
      border-left-color: var(--warn);
      color: var(--warn);
    }

    /* ── Section title ── */
    .section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: var(--hint);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .section-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .section-title-row .section-title { margin-bottom: 0; }

    /* ── Budget: Category cards (ledger entries) ── */
    .cat-card {
      background: none;
      border-radius: 0;
      padding: 18px 0;
      margin-bottom: 0;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.2s;
    }
    .cat-card:hover { background: rgba(245,240,232,0.02); }

    .cat-header {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-bottom: 6px;
    }

    .cat-badge {
      width: auto;
      height: auto;
      border-radius: 0;
      background: none !important;
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--hint);
      flex-shrink: 0;
      margin-right: 16px;
      line-height: 1.2;
    }

    .cat-info { flex: 1; min-width: 0; }
    .cat-name {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 1px;
    }
    .cat-sub {
      font-size: 12px;
      font-weight: 400;
      color: var(--hint);
    }

    .cat-amounts {
      display: flex;
      align-items: baseline;
      gap: 2px;
      flex-shrink: 0;
      text-align: right;
      padding-top: 2px;
    }
    .cat-amounts .spent {
      font-family: 'DM Serif Display', serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--ink);
    }
    .cat-amounts .budget {
      font-size: 12px;
      font-weight: 400;
      color: var(--hint);
      white-space: nowrap;
    }

    .cat-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }
    .remain-tag {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--muted);
      background: none;
      padding: 0;
      border-radius: 0;
    }
    .remain-tag.warn { color: var(--warn); }

    /* Progress in cat card */
    .cat-progress { margin-top: 8px; }
    .cat-progress .progress-track {
      height: 1px;
      background: var(--line);
      border-radius: 0;
    }
    .cat-progress .progress-fill {
      height: 2px;
      border-radius: 0;
      margin-top: -0.5px;
    }
    .cat-progress .progress-fill.purple,
    .cat-progress .progress-fill.coral,
    .cat-progress .progress-fill.sage,
    .cat-progress .progress-fill.amber { background: var(--gold); }
    .cat-progress .progress-fill.warn { background: var(--warn); }

    /* Cat expand */
    .cat-expand-chevron {
      font-size: 14px;
      color: var(--hint);
      transition: transform 0.3s ease;
    }
    .cat-expand-chevron.open { transform: rotate(90deg); }

    .cat-expand {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .cat-expand.open {
      max-height: 40vh;
      overflow-y: auto;
      margin-top: 14px;
    }
    .cat-expand.open::-webkit-scrollbar { width: 3px; }
    .cat-expand.open::-webkit-scrollbar-track { background: transparent; }
    .cat-expand.open::-webkit-scrollbar-thumb {
      background: var(--hint);
      border-radius: 1px;
    }

    .cat-expand-inner {
      background: rgba(245,240,232,0.03);
      border-radius: 0;
      padding: 12px 14px;
    }
    .cat-expand-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 46px;
      padding: 0;
      border-bottom: 1px solid rgba(245,240,232,0.05);
    }
    .cat-expand-item:last-child { border-bottom: none; }
    .cat-expand-desc {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      flex: 1;
      min-width: 0;
      padding-right: 12px;
      line-height: 1.3;
    }
    .cat-expand-date {
      font-size: 11px;
      font-weight: 400;
      color: var(--hint);
      margin-top: 2px;
    }
    .cat-expand-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--ink);
      flex-shrink: 0;
    }
    .cat-expand-empty {
      font-size: 12px;
      color: var(--hint);
      text-align: center;
      padding: 16px 0;
    }
    .cat-expand-fade {
      position: sticky;
      bottom: 0;
      height: 24px;
      background: linear-gradient(to bottom, transparent, rgba(28,27,24,0.9));
      pointer-events: none;
      margin: 0 -14px -12px;
    }

    /* Old badge classes kept for JS compatibility */
    .remain-badge, .warn-badge { display: none; }

    /* ── Monthly total ── */
    .monthly-total {
      background: rgba(245,240,232,0.04);
      border-radius: 2px;
      padding: 24px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0;
      margin-top: 4px;
      border-left: 2px solid var(--gold);
    }
    .monthly-total .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--hint);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .monthly-total .value {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--ink);
      letter-spacing: 0;
    }
    .monthly-total .remain .value { color: var(--gold); }

    /* ── Records tab ── */
    .records-section { margin-bottom: 16px; }
    .date-group { margin-bottom: 24px; }
    .date-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      cursor: pointer;
      user-select: none;
      padding: 4px 0;
    }
    .date-divider .date-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      white-space: nowrap;
      width: 128px;
      flex-shrink: 0;
    }
    .date-divider .line {
      flex: 1;
      height: 1px;
      background: var(--line);
    }
    .date-divider .day-sum {
      font-family: 'DM Serif Display', serif;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .date-divider .chevron {
      font-size: 11px;
      color: var(--hint);
      transition: transform 0.2s;
      flex-shrink: 0;
      width: 14px;
      text-align: center;
    }
    .date-divider .chevron.open { transform: rotate(90deg); }
    .peak-tag {
      font-size: 10px;
      color: var(--warn);
      margin-left: 6px;
    }
    .records-body { display: none; }
    .records-body.open { display: block; }

    .record-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      border-left: 2px solid var(--gold);
      padding-left: 10px;
      margin-bottom: 1px;
    }
    .record-item:last-of-type { border-bottom: none; }

    .record-dot { display: none; }

    .record-info { flex: 1; min-width: 0; }
    .record-desc {
      font-size: 14px;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .record-meta {
      font-size: 11px;
      color: var(--hint);
      margin-top: 3px;
    }
    .record-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: var(--ink);
      flex-shrink: 0;
    }
    .record-delete {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      opacity: 0;
      padding: 6px;
      border-radius: 2px;
      transition: opacity 0.15s;
      color: var(--hint);
    }
    .record-item:hover .record-delete,
    .record-item:active .record-delete { opacity: 0.6; }
    .record-thumb {
      width: 36px;
      height: 36px;
      border-radius: 2px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .empty-state {
      text-align: center;
      padding: 64px 20px;
      color: var(--hint);
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    /* ── Add form ── */
    .add-section {
      background: none;
      border-radius: 0;
      padding: 0;
    }
    .add-title {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      margin-bottom: 24px;
      color: var(--ink);
      letter-spacing: -0.01em;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--hint);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .form-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--line);
      background: transparent;
      border-radius: 0;
      padding: 12px 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      min-height: 44px;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-bottom-color: var(--gold); box-shadow: none; }
    .form-input.amount {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      font-weight: 300;
    }
    .form-input::placeholder { color: var(--hint); }

    .cat-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .cat-btn {
      border: 1px solid var(--line);
      border-radius: 2px;
      padding: 12px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      min-height: 48px;
      transition: all 0.2s;
      text-align: center;
      letter-spacing: 0.03em;
    }
    .cat-btn.selected {
      background: rgba(196,148,74,0.1);
      color: var(--gold);
      border-color: var(--gold);
      font-weight: 600;
    }
    .cat-btn.selected.purple,
    .cat-btn.selected.coral,
    .cat-btn.selected.sage,
    .cat-btn.selected.amber {
      background: rgba(196,148,74,0.1);
      color: var(--gold);
      border-color: var(--gold);
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 2px;
      padding: 16px;
      background: var(--gold);
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-height: 52px;
      margin-top: 12px;
      transition: opacity 0.2s;
      letter-spacing: 0.06em;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { opacity: 0.75; }

    .upload-zone {
      border: 1px dashed var(--line);
      border-radius: 2px;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 20px;
      transition: border-color 0.2s;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--hint);
      font-size: 12px;
      position: relative;
      overflow: hidden;
    }
    .upload-zone:hover { border-color: var(--gold); }
    .upload-zone img {
      max-width: 100%;
      max-height: 120px;
      border-radius: 2px;
      object-fit: contain;
    }
    .upload-zone input { display: none; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 64px;
      background: rgba(28,27,24,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 8px 16px;
      position: relative;
      transition: color 0.2s;
      color: var(--hint);
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
    }
    .nav-item .nav-icon { font-size: 18px; line-height: 1; }
    .nav-item .nav-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
    }
    .nav-item::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 20px;
      height: 2px;
      background: var(--gold);
      transition: transform 0.2s;
    }
    .nav-item.active { color: var(--gold); }
    .nav-item.active::after { transform: translateX(-50%) scaleX(1); }

    /* ── Export btn ── */
    .export-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--hint);
      padding: 4px 8px;
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.15s;
      text-transform: uppercase;
    }
    .export-btn:hover { color: var(--gold); }

    /* ── Import btn ── */
    .import-btn {
      display: block;
      width: 100%;
      border: none;
      padding: 8px;
      background: transparent;
      color: var(--hint);
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.06em;
      cursor: pointer;
      margin-top: 24px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .import-btn:hover { opacity: 0.4; }

    /* ── Pills (home) ── */
    .pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .pill {
      background: none;
      border-radius: 0;
      padding: 0;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--hint);
      white-space: nowrap;
    }
    .pill strong {
      color: var(--ink);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="app" id="app">

    <!-- ═══ Tab 1: 首页 ═══ -->
    <div class="tab-page active" id="tabHome">
      <div class="home-header">
        <div class="brand">my <em>budget</em></div>
        <div class="today-date" id="todayBadge"></div>
      </div>
      <div class="month-picker">
        <button type="button" id="prevMonth" aria-label="上月">‹</button>
        <span class="month-picker-label" id="monthLabel"></span>
        <button type="button" id="nextMonth" aria-label="下月">›</button>
      </div>

      <div class="pills" id="pills"></div>

      <div class="hero">
        <div class="hero-label">Remaining</div>
        <div class="hero-amount num" id="heroRemaining">¥0</div>
        <div class="hero-sub" id="heroSub"></div>
        <div class="progress-track">
          <div class="progress-fill" id="heroProgress" style="width:0%"></div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">今日</div>
          <div class="stat-value num" id="statToday">¥0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">本月</div>
          <div class="stat-value num" id="statMonth">¥0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">01 个人提升</div>
          <div class="stat-value num" id="statCat01">¥0</div>
          <div class="stat-extra" id="statRollover"></div>
        </div>
      </div>

      <div class="banners" id="banners"></div>
    </div>

    <!-- ═══ Tab 2: 预算 ═══ -->
    <div class="tab-page" id="tabBudget">
      <div class="section-title">预算类目</div>
      <div id="catCards"></div>
      <div class="monthly-total">
        <div>
          <div class="label">本月总支出</div>
          <div class="value num" id="totalSpent">¥0</div>
        </div>
        <div class="remain" style="text-align:right">
          <div class="label">剩余预算</div>
          <div class="value num" id="totalRemain">¥0</div>
        </div>
      </div>
    </div>

    <!-- ═══ Tab 3: 记录 ═══ -->
    <div class="tab-page" id="tabRecords">
      <div class="section-title-row">
        <span class="section-title">消费记录</span>
        <button type="button" class="export-btn" id="exportBtn">导出</button>
      </div>
      <div id="recordsList"></div>
    </div>

    <!-- ═══ Tab 4: 记账 ═══ -->
    <div class="tab-page" id="tabAdd">
      <div class="add-section">
        <div class="add-title">记一笔</div>
        <div class="form-group">
          <label>消费描述</label>
          <input type="text" class="form-input" id="descInput" placeholder="今天花了什么？">
        </div>
        <div class="form-group">
          <label>金额</label>
          <input type="number" class="form-input amount" id="amountInput" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" class="form-input" id="dateInput">
        </div>
        <div class="form-group">
          <label>类目</label>
          <div class="cat-buttons" id="catButtons"></div>
        </div>
        <button type="button" class="submit-btn" id="submitBtn">记录这笔消费</button>
      </div>

      <button type="button" class="import-btn" id="importBtn">↻ 导入历史数据</button>
      <input type="file" id="jsonFileInput" accept=".json" style="display:none">
    </div>

    <!-- ═══ 底部导航 ═══ -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="tabHome">
        <span class="nav-icon">◉</span>
        <span class="nav-label">首页</span>
      </button>
      <button class="nav-item" data-tab="tabBudget">
        <span class="nav-icon">◒</span>
        <span class="nav-label">预算</span>
      </button>
      <button class="nav-item" data-tab="tabRecords">
        <span class="nav-icon">☰</span>
        <span class="nav-label">记录</span>
      </button>
      <button class="nav-item" data-tab="tabAdd">
        <span class="nav-icon">+</span>
        <span class="nav-label">记账</span>
      </button>
    </nav>
  </div>

  <script>
    const STORAGE_KEY = 'budget_app_data';

    const CATS = {
      '01': { name: '个人提升', sub: '健身课、活动、运动课程等', color: 'purple', budget: 600 },
      '02': { name: '取悦自己', sub: '看电影、买衣服、精神愉悦消费', color: 'coral', budget: 500 },
      '03': { name: '生存消费', sub: '吃饭、交通、日常开销', color: 'sage', budget: 1500 },
      '04': { name: '其他', sub: '礼物、杂项', color: 'amber', budget: 400 }
    };

    const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
    let data = loadData();
    let selectedCat = '03';
    let pendingImage = null;
    let currentTab = 'tabHome';

    function defaultData() {
      return {
        currentMonth: formatMonth(new Date()),
        monthlyBudgets: { '01': 600, '02': 500, '03': 1500, '04': 400 },
        cat01Rollover: 0,
        records: []
      };
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      return defaultData();
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function formatMonth(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    }

    function parseMonth(str) {
      const [y, m] = str.split('-').map(Number);
      return new Date(y, m - 1, 1);
    }

    function monthLabelCN(str) {
      const months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
      const m = parseInt(str.split('-')[1], 10);
      return months[m - 1];
    }

    function formatMoney(n) {
      const fixed = Math.round(n * 100) / 100;
      const parts = fixed.toFixed(2).split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return '¥' + parts.join('.');
    }

    function formatDateCN(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${d.getMonth() + 1}月${dd}日 · ${WEEKDAYS[d.getDay()]}`;
    }

    function formatDateShort(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    function recordsInMonth(month) {
      return data.records.filter(r => r.date.startsWith(month));
    }

    function spentByCat(month, cat) {
      return recordsInMonth(month).filter(r => r.cat === cat).reduce((s, r) => s + r.amount, 0);
    }

    function totalSpentInMonth(month) {
      return recordsInMonth(month).reduce((s, r) => s + r.amount, 0);
    }

    function getAllMonths() {
      const months = new Set([data.currentMonth]);
      data.records.forEach(r => months.add(r.date.slice(0, 7)));
      return Array.from(months).sort();
    }

    function getCat01Rollover(month) {
      const allMonths = getAllMonths();
      const earliest = allMonths[0];
      if (month <= earliest) return 0;
      let rollover = 0;
      const cur = parseMonth(earliest);
      while (formatMonth(cur) < month) {
        const key = formatMonth(cur);
        const budget01 = CATS['01'].budget + rollover;
        const spent01 = spentByCat(key, '01');
        const remain = budget01 - spent01;
        rollover = remain > 0 ? remain : 0;
        cur.setMonth(cur.getMonth() + 1);
      }
      return rollover;
    }

    function getCatBudget(month, cat) {
      if (cat === '01') return CATS['01'].budget + getCat01Rollover(month);
      return CATS[cat].budget;
    }

    function getTotalBudget(month) {
      return Object.keys(CATS).reduce((s, c) => s + getCatBudget(month, c), 0);
    }

    function shiftMonth(str, delta) {
      const d = parseMonth(str);
      d.setMonth(d.getMonth() + delta);
      return formatMonth(d);
    }

    // ── Tab switching ──
    function switchTab(tabId) {
      currentTab = tabId;
      document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => {
        n.classList.toggle('active', n.dataset.tab === tabId);
      });
      if (tabId === 'tabAdd') { initCatButtons(); }
      if (tabId === 'tabRecords') { renderRecords(data.currentMonth); }
    }

    // ── Main render ──
    function render() {
      const month = data.currentMonth;
      const rollover = getCat01Rollover(month);
      const totalBudget = getTotalBudget(month);
      const totalSpent = totalSpentInMonth(month);
      const totalRemain = totalBudget - totalSpent;
      const spentPct = totalBudget > 0 ? Math.min(100, (totalSpent / totalBudget) * 100) : 0;

      const todayStr = new Date().toISOString().slice(0, 10);
      const todaySpent = data.records.filter(r => r.date === todayStr).reduce((s, r) => s + r.amount, 0);
      const recordDays = new Set(recordsInMonth(month).map(r => r.date)).size;

      const now = new Date();
      document.getElementById('todayBadge').textContent =
        `${now.getFullYear()} · ${now.getMonth() + 1}/${now.getDate()}`;
      document.getElementById('monthLabel').textContent = monthLabelCN(month);

      // Pills
      document.getElementById('pills').innerHTML = `
        <span class="pill"><strong>${monthLabelCN(month)}</strong></span>
        <span class="pill">预算 <strong>${formatMoney(totalBudget)}</strong></span>
        <span class="pill">已记 <strong>${recordDays}</strong> 天</span>
      `;

      // Hero
      document.getElementById('heroRemaining').textContent = formatMoney(Math.max(0, totalRemain));
      document.getElementById('heroSub').textContent =
        `已支出 ${formatMoney(totalSpent)} · 剩余 ${totalBudget > 0 ? Math.round((totalRemain / totalBudget) * 100) : 0}%`;
      document.getElementById('heroProgress').style.width = spentPct + '%';

      // Stats
      document.getElementById('statToday').textContent = formatMoney(todaySpent);
      document.getElementById('statMonth').textContent = formatMoney(totalSpent);
      document.getElementById('statCat01').textContent = formatMoney(spentByCat(month, '01'));
      document.getElementById('statRollover').textContent = rollover > 0 ? `结转 ${formatMoney(rollover)}` : '';

      // Category cards
      document.getElementById('catCards').innerHTML = Object.entries(CATS).map(([id, cat]) => {
        const budget = getCatBudget(month, id);
        const spent = spentByCat(month, id);
        const remain = budget - spent;
        const pct = budget > 0 ? Math.min(100, (spent / budget) * 100) : 0;
        const lowRemain = remain < budget * 0.2 && remain >= 0;
        const over = remain < 0;
        const rolloverNote = id === '01' && rollover > 0 ? `（含结转 ${formatMoney(rollover)}）` : '';

        const remainLabel = over ? `超支 ${formatMoney(-remain)}` : `剩余 ${formatMoney(remain)}`;

        const catRecords = recordsInMonth(month)
          .filter(r => r.cat === id)
          .sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);

        let recordsHtml = catRecords.length === 0
          ? '<div class="cat-expand-empty">暂无消费记录</div>'
          : catRecords.map(r => `
            <div class="cat-expand-item">
              <div class="cat-expand-desc">
                <div>${escapeHtml(r.desc)}</div>
                <div class="cat-expand-date">${formatDateShort(r.date)}</div>
              </div>
              <div class="cat-expand-amount">${formatMoney(r.amount)}</div>
            </div>
          `).join('');

        return `
          <div class="cat-card" data-cat="${id}">
            <div class="cat-header">
              <div class="cat-badge">${id}</div>
              <div class="cat-info">
                <div class="cat-name">${cat.name}</div>
                <div class="cat-sub">${cat.sub}</div>
              </div>
              <div class="cat-amounts">
                <span class="spent">${formatMoney(spent)}</span>
                <span class="budget">/ ${formatMoney(budget)}${rolloverNote}</span>
              </div>
            </div>
            <div class="progress-track cat-progress">
              <div class="progress-fill${over ? ' warn' : ''}" style="width:${pct}%"></div>
            </div>
            <div class="cat-footer">
              <span class="remain-tag${(lowRemain || over) ? ' warn' : ''}">${remainLabel}</span>
              <span class="cat-expand-chevron">›</span>
            </div>
            <div class="cat-expand">
              <div class="cat-expand-inner">${recordsHtml}</div>
              <div class="cat-expand-fade"></div>
            </div>
          </div>
        `;
      }).join('');

      // Expand/collapse
      document.querySelectorAll('.cat-card').forEach(card => {
        card.addEventListener('click', () => {
          const expand = card.querySelector('.cat-expand');
          const chevron = card.querySelector('.cat-expand-chevron');
          const isOpen = expand.classList.contains('open');
          expand.classList.toggle('open', !isOpen);
          chevron.classList.toggle('open', !isOpen);
        });
      });

      // Banners
      const banners = [];
      const remain02 = getCatBudget(month, '02') - spentByCat(month, '02');
      if (remain02 < 200) {
        banners.push(`<div class="banner warn">取悦自己预算剩余不足 · 当前余 ${formatMoney(Math.max(0, remain02))} · 请适度消费</div>`);
      }
      const remain01 = getCatBudget(month, '01') - spentByCat(month, '01');
      if (remain01 > 0) {
        banners.push(`<div class="banner">个人提升还剩 ${formatMoney(Math.max(0, remain01))} · 投资自己永远不亏</div>`);
      }
      document.getElementById('banners').innerHTML = banners.join('');

      // Records
      renderRecords(month);

      // Monthly total
      document.getElementById('totalSpent').textContent = formatMoney(totalSpent);
      document.getElementById('totalRemain').textContent = formatMoney(Math.max(0, totalRemain));

      data.cat01Rollover = rollover;
      saveData();
    }

    function renderRecords(month) {
      const records = recordsInMonth(month).sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
      const container = document.getElementById('recordsList');
      const todayStr = new Date().toISOString().slice(0, 10);

      if (records.length === 0) {
        container.innerHTML = '<div class="empty-state">还没有消费记录</div>';
        return;
      }

      const dayTotals = {};
      records.forEach(r => { dayTotals[r.date] = (dayTotals[r.date] || 0) + r.amount; });
      let peakDate = null, peakAmount = 0;
      Object.entries(dayTotals).forEach(([date, amt]) => {
        if (amt > peakAmount) { peakAmount = amt; peakDate = date; }
      });

      const groups = {};
      records.forEach(r => {
        if (!groups[r.date]) groups[r.date] = [];
        groups[r.date].push(r);
      });

      const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

      container.innerHTML = sortedDates.map(date => {
        const items = groups[date];
        const dayTotal = dayTotals[date];
        const isPeak = date === peakDate && sortedDates.length > 1;
        const isToday = date === todayStr;
        const peakTag = isPeak ? '<span class="peak-tag">峰值</span>' : '';
        const openClass = isToday ? ' open' : '';

        return `
          <div class="date-group">
            <div class="date-divider" data-date="${date}">
              <span class="date-text">${formatDateCN(date)}</span>${peakTag}
              <div class="line"></div>
              <span class="day-sum">${formatMoney(dayTotal)}</span>
              <span class="chevron${openClass}">›</span>
            </div>
            <div class="records-body${openClass}">
              ${items.map(r => {
                const cat = CATS[r.cat];
                const thumb = r.imageBase64 ? `<img class="record-thumb" src="${r.imageBase64}" alt="">` : '';
                return `
                  <div class="record-item">
                    ${thumb}
                    <div class="record-info">
                      <div class="record-desc">${escapeHtml(r.desc)}</div>
                      <div class="record-meta">${cat.name}</div>
                    </div>
                    <div class="record-amount">${formatMoney(r.amount)}</div>
                    <button class="record-delete" data-id="${r.id}" title="删除">✕</button>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');

      container.querySelectorAll('.date-divider').forEach(div => {
        div.addEventListener('click', () => {
          const body = div.nextElementSibling;
          const chevron = div.querySelector('.chevron');
          const isOpen = body.classList.contains('open');
          body.classList.toggle('open', !isOpen);
          chevron.classList.toggle('open', !isOpen);
        });
      });

      container.querySelectorAll('.record-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          if (confirm('确定删除这条消费记录吗？')) {
            data.records = data.records.filter(r => String(r.id) !== String(id));
            saveData();
            render();
          }
        });
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function initCatButtons() {
      const container = document.getElementById('catButtons');
      container.innerHTML = Object.entries(CATS).map(([id, cat]) =>
        `<button type="button" class="cat-btn ${id === selectedCat ? 'selected ' + cat.color : ''}" data-cat="${id}">
          ${id} ${cat.name}
        </button>`
      ).join('');
      container.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedCat = btn.dataset.cat;
          container.querySelectorAll('.cat-btn').forEach(b => {
            b.className = 'cat-btn';
            if (b.dataset.cat === selectedCat) {
              b.classList.add('selected', CATS[selectedCat].color);
            }
          });
        });
      });
    }

    function clearForm() {
      document.getElementById('descInput').value = '';
      document.getElementById('amountInput').value = '';
      pendingImage = null;
      document.getElementById('uploadPreview').style.display = 'none';
      document.getElementById('uploadText').style.display = '';
      document.getElementById('imageInput').value = '';
      document.getElementById('dateInput').value = new Date().toISOString().slice(0, 10);
    }

    function addRecord() {
      const desc = document.getElementById('descInput').value.trim();
      const amount = parseFloat(document.getElementById('amountInput').value);
      const date = document.getElementById('dateInput').value;
      if (!desc) { alert('请填写消费描述'); return; }
      if (!amount || amount <= 0) { alert('请填写有效金额'); return; }
      if (!date) { alert('请选择日期'); return; }
      data.records.push({
        id: Date.now(), date, desc,
        amount: Math.round(amount * 100) / 100,
        cat: selectedCat, emoji: '', imageBase64: pendingImage
      });
      data.currentMonth = date.slice(0, 7);
      saveData();
      render();
      clearForm();
      switchTab('tabRecords');
    }

    // ── Events ──
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
    document.getElementById('prevMonth').addEventListener('click', () => {
      data.currentMonth = shiftMonth(data.currentMonth, -1);
      saveData(); render();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
      data.currentMonth = shiftMonth(data.currentMonth, 1);
      saveData(); render();
    });
    document.getElementById('submitBtn').addEventListener('click', addRecord);

    const uploadZone = document.getElementById('uploadZone');
    const imageInput = document.getElementById('imageInput');
    uploadZone.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', () => {
      const file = imageInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        pendingImage = e.target.result;
        const preview = document.getElementById('uploadPreview');
        preview.src = pendingImage;
        preview.style.display = 'block';
        document.getElementById('uploadText').style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    // Export
    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `budget_backup_${data.currentMonth}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // Import
    const jsonFileInput = document.getElementById('jsonFileInput');
    document.getElementById('importBtn').addEventListener('click', () => {
      if (!confirm('选择本地 data.json 文件导入历史账单数据')) return;
      jsonFileInput.click();
    });
    jsonFileInput.addEventListener('change', () => {
      const file = jsonFileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const json = JSON.parse(e.target.result);
          if (!json.records || !Array.isArray(json.records)) {
            alert('JSON 格式不正确'); return;
          }
          const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
          const existingIds = new Set((existing.records || []).map(r => r.id));
          const newRecords = json.records.filter(r => !existingIds.has(r.id));
          const merged = {
            currentMonth: json.currentMonth || existing.currentMonth,
            monthlyBudgets: json.monthlyBudgets || existing.monthlyBudgets || { '01':600,'02':500,'03':1500,'04':400 },
            cat01Rollover: existing.cat01Rollover || 0,
            records: [...newRecords, ...(existing.records || [])]
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
          location.reload();
        } catch (err) { alert('JSON 解析失败：' + err.message); }
      };
      reader.readAsText(file);
    });

    // Init
    document.getElementById('dateInput').value = new Date().toISOString().slice(0, 10);
    render();
  </script>
</body>
</html>
