<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>my budget · 我的记账本</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #1C1B18;
      --surface:  rgba(245,240,232,0.04);
      --surface2: rgba(245,240,232,0.07);
      --cream:    #1C1B18;
      --warm:     rgba(245,240,232,0.04);
      --ink:      #F5F0E8;
      --muted:    #9C9890;
      --hint:     #6B6762;
      --gold:     #C4944A;
      --gold-dim: rgba(196,148,74,0.1);
      --warn:     #D8553A;
      --warn-dim: rgba(216,85,58,0.1);
      --line:     rgba(245,240,232,0.08);
      --radius: 4px;
      --radius-sm: 2px;

      --sage:       #C4944A;
      --sage-light: rgba(196,148,74,0.08);
      --sage-mid:   rgba(196,148,74,0.2);
      --sage-dark:  #C4944A;
      --purple:       #C4944A;
      --purple-light: rgba(196,148,74,0.1);
      --coral:        #C4944A;
      --coral-light:  rgba(196,148,74,0.1);
      --amber:        #C4944A;
      --amber-light:  rgba(196,148,74,0.1);
      --warn-light:   rgba(216,85,58,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 28px 20px 0;
    }

    .serif { font-family: 'DM Serif Display', serif; }
    .num { font-family: 'DM Serif Display', serif; font-variant-numeric: tabular-nums; }

    /* ── Tab pages ── */
    .tab-page { display: none; padding-bottom: 80px; }
    .tab-page.active { display: block; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .brand {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .brand em {
      font-style: italic;
      color: var(--gold);
    }

    .header-right {
      text-align: right;
    }

    .date-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--surface);
      border-radius: 999px;
      padding: 4px 6px;
    }

    .month-nav button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .month-nav button:hover { background: var(--gold-dim); color: var(--gold); }

    .month-label {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      min-width: 56px;
      text-align: center;
      color: var(--ink);
    }

    /* Pills */
    .pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .pill {
      background: none;
      border-radius: 0;
      padding: 0;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--hint);
      white-space: nowrap;
    }

    .pill strong { color: var(--ink); font-weight: 600; }

    /* Hero */
    .hero {
      background: none;
      border-radius: 0;
      padding: 0;
      margin-bottom: 32px;
      position: relative;
      overflow: visible;
    }

    .hero-deco { display: none; }

    .hero-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      color: var(--hint);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .hero-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 72px;
      font-weight: 300;
      color: var(--ink);
      line-height: 1;
      letter-spacing: -1.5px;
      margin-bottom: 16px;
    }

    .hero-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .progress-track {
      height: 1px;
      background: var(--line);
      border-radius: 0;
      overflow: visible;
    }

    .progress-fill {
      height: 2px;
      border-radius: 0;
      background: var(--gold);
      margin-top: -0.5px;
      transition: width 0.6s ease;
    }

    .hero .progress-fill { background: var(--gold); }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 0;
      margin-bottom: 48px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 20px 0;
    }

    .stat-card {
      flex: 1;
      background: none;
      border-radius: 0;
      padding: 0;
      text-align: center;
      border-right: 1px solid var(--line);
    }
    .stat-card:last-child { border-right: none; }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--hint);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--ink);
    }

    .stat-extra {
      font-size: 10px;
      color: var(--gold);
      margin-top: 4px;
    }

    /* Category cards */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--hint);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .section-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .section-title-row .section-title { margin-bottom: 0; }

    .cat-card {
      background: none;
      border-radius: 0;
      padding: 16px 8px;
      margin-bottom: 0;
      border-bottom: 1px solid var(--line);
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: background 0.2s, border-left-color 0.2s;
    }
    .cat-card:hover {
      background: rgba(245,240,232,0.02);
      border-left-color: var(--gold);
    }

    .cat-header {
      display: flex;
      align-items: baseline;
      gap: 0;
      margin-bottom: 3px;
      position: relative;
    }

    .cat-badge {
      position: absolute;
      left: 0;
      top: 0;
      width: 32px;
      height: auto;
      border-radius: 0;
      background: none !important;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      font-weight: 400;
      flex-shrink: 0;
      color: var(--hint);
      padding-right: 0;
      line-height: 1.3;
    }

    .cat-badge.purple,
    .cat-badge.coral,
    .cat-badge.sage,
    .cat-badge.amber { background: none !important; color: var(--hint); }

    .cat-info { flex: 1; min-width: 0; margin-left: 44px; }

    .cat-name {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .cat-sub {
      font-size: 12px;
      font-weight: 400;
      color: var(--hint);
      margin-top: 1px;
      margin-left: 44px;
    }

    .cat-amounts {
      display: flex;
      align-items: baseline;
      gap: 2px;
      flex-shrink: 0;
      text-align: right;
    }

    .cat-amounts .spent {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--ink);
    }

    .cat-amounts .budget {
      font-size: 13px;
      font-weight: 400;
      color: var(--hint);
      white-space: nowrap;
    }

    .cat-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      padding-left: 44px;
    }

    /* Dot progress */
    .progress-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .pdot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(245,240,232,0.06);
      transition: background 0.5s ease, box-shadow 0.5s ease;
    }
    .pdot.on {
      background: var(--gold);
      box-shadow: 0 0 4px rgba(196,148,74,0.5);
    }
    .pdot.on.high { background: var(--warn); box-shadow: 0 0 4px rgba(216,85,58,0.5); }

    .remain-badge {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 0;
      border-radius: 0;
      background: none;
      color: var(--muted);
      white-space: nowrap;
    }
    .remain-badge.low { color: var(--gold); }
    .remain-badge.over { color: var(--warn); font-weight: 600; }

    .warn-badge {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.03em;
      padding: 0;
      border-radius: 0;
      background: none;
      color: var(--warn);
      white-space: nowrap;
    }
    .warn-badge.low { color: var(--gold); }
    .warn-badge.over { color: var(--warn); font-weight: 600; }

    /* Cat card expand */
    .cat-card { cursor: pointer; }
    .cat-progress { display: none; }
    .cat-expand-chevron {
      font-size: 14px;
      color: var(--hint);
      transition: transform 0.3s ease;
      margin-left: auto;
    }
    .cat-expand-chevron.open { transform: rotate(90deg); }

    .cat-expand {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .cat-expand.open {
      max-height: 40vh;
      overflow-y: auto;
      margin-top: 10px;
    }

    /* Thin scrollbar */
    .cat-expand.open::-webkit-scrollbar { width: 4px; }
    .cat-expand.open::-webkit-scrollbar-track { background: transparent; }
    .cat-expand.open::-webkit-scrollbar-thumb {
      background: var(--hint);
      border-radius: 2px;
    }

    .cat-expand-inner {
      background: var(--surface);
      border-radius: 2px;
      padding: 10px 12px;
    }

    .cat-expand-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 46px;
      padding: 0;
      border-bottom: 1px solid var(--line);
    }
    .cat-expand-item:last-child { border-bottom: none; }

    .cat-expand-desc {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      flex: 1;
      min-width: 0;
      padding-right: 12px;
      line-height: 1.3;
    }

    .cat-expand-date {
      font-size: 11px;
      font-weight: 400;
      color: var(--hint);
      margin-top: 2px;
    }

    .cat-expand-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--ink);
      flex-shrink: 0;
    }

    .cat-expand-empty {
      font-size: 12px;
      color: var(--hint);
      text-align: center;
      padding: 16px 0;
    }

    .cat-expand-fade {
      position: sticky;
      bottom: 0;
      height: 24px;
      background: linear-gradient(to bottom, transparent, rgba(28,27,24,0.9));
      pointer-events: none;
      margin: 0 -12px -10px;
      border-radius: 0;
    }

    .cat-progress .progress-fill { background: var(--gold); }
    .cat-progress .progress-fill.low   { background: var(--gold); }
    .cat-progress .progress-fill.mid   { background: var(--gold); opacity: 0.8; }
    .cat-progress .progress-fill.high  { background: var(--warn); }
    .cat-progress .progress-fill.zero  { background: var(--gold); opacity: 0.15; }

    /* Thin scrollbar for dark */
    .cat-expand.open::-webkit-scrollbar { width: 3px; }
    .cat-expand.open::-webkit-scrollbar-track { background: transparent; }
    .cat-expand.open::-webkit-scrollbar-thumb {
      background: var(--hint);
      border-radius: 1px;
    }

    /* Banners */
    .banners { margin-bottom: 10px; }

    .banners { margin-bottom: 32px; }
    .banner {
      border-radius: 0;
      padding: 14px 16px;
      font-size: 12px;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
      line-height: 1.5;
      background: var(--gold-dim);
      border: none;
      border-left: 2px solid var(--gold);
      color: var(--gold);
    }
    .banner.warn {
      background: var(--warn-dim);
      border-left-color: var(--warn);
      color: var(--warn);
    }
    .banner.encourage { color: var(--gold); }

    /* Records */
    .records-section { margin-bottom: 16px; }
    .date-group { margin-bottom: 20px; }

    .date-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      user-select: none;
      padding: 4px 0;
    }

    .date-divider .date-text {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      width: 128px;
      flex-shrink: 0;
    }

    .date-divider .line {
      flex: 1;
      height: 1px;
      background: var(--hint);
      opacity: 0.4;
    }

    .date-divider .day-sum {
      font-family: 'DM Serif Display', serif;
      font-size: 13px;
      color: var(--ink);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .date-divider .chevron {
      font-size: 11px;
      color: var(--hint);
      transition: transform 0.2s;
      flex-shrink: 0;
      width: 14px;
      text-align: center;
    }
    .date-divider .chevron.open { transform: rotate(90deg); }

    .peak-tag {
      font-size: 10px;
      color: var(--coral);
      margin-left: 4px;
    }

    .records-body { display: none; }
    .records-body.open { display: block; }

    .record-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0 10px 10px;
      border-bottom: 1px solid var(--line);
      border-left: 2px solid var(--gold);
      margin-bottom: 1px;
    }

    .record-item:last-of-type { border-bottom: none; }

    .record-dot { display: none; }

    .record-dot.purple,
    .record-dot.coral,
    .record-dot.sage,
    .record-dot.amber { display: none; }

    .record-info { flex: 1; min-width: 0; }

    .record-desc {
      font-size: 14px;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .record-meta {
      font-size: 11px;
      color: var(--hint);
      margin-top: 2px;
    }

    .record-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: var(--ink);
      flex-shrink: 0;
    }

    .record-delete {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      opacity: 0.4;
      padding: 6px;
      min-width: 32px;
      min-height: 32px;
      border-radius: 8px;
      transition: opacity 0.15s;
    }

    .record-delete:hover { opacity: 1; }

    .record-thumb {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .day-total {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      padding: 6px 0 2px;
    }

    .day-total strong {
      font-family: 'DM Serif Display', serif;
      color: var(--ink);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--hint);
      font-size: 14px;
    }

    /* Monthly total */
    .monthly-total {
      background: none;
      border-radius: 0;
      padding: 20px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0;
      margin-top: 0;
      border-top: 2px solid var(--line);
      border-bottom: 2px solid var(--line);
      border-left: none;
    }

    .monthly-total .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--hint);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .monthly-total .value {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--ink);
    }

    .monthly-total .remain .value { color: var(--gold); }

    /* Add form */
    .add-section {
      background: none;
      border-radius: 0;
      padding: 0;
    }

    .add-title {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      margin-bottom: 24px;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .upload-zone {
      border: 1px dashed var(--line);
      border-radius: 2px;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 20px;
      transition: border-color 0.2s;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--hint);
      font-size: 12px;
      position: relative;
      overflow: hidden;
    }

    .upload-zone:hover { border-color: var(--gold); background: none; }

    .upload-zone img {
      max-width: 100%;
      max-height: 120px;
      border-radius: 2px;
      object-fit: contain;
    }

    .upload-zone input { display: none; }

    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--hint);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .form-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--line);
      background: transparent;
      border-radius: 0;
      padding: 12px 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      min-height: 44px;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-bottom-color: var(--gold); box-shadow: none; }

    .form-input.amount {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      font-weight: 300;
    }

    .form-input::placeholder { color: var(--hint); }

    .cat-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .cat-btn {
      border: 1px solid var(--line);
      border-radius: 2px;
      padding: 12px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      min-height: 48px;
      transition: all 0.2s;
      text-align: center;
      letter-spacing: 0.03em;
    }

    .cat-btn.selected.purple,
    .cat-btn.selected.coral,
    .cat-btn.selected.sage,
    .cat-btn.selected.amber {
      background: var(--gold-dim);
      color: var(--gold);
      border-color: var(--gold);
      font-weight: 600;
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 2px;
      padding: 16px;
      background: var(--gold);
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-height: 52px;
      margin-top: 12px;
      transition: opacity 0.2s;
      letter-spacing: 0.06em;
    }

    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { opacity: 0.75; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 64px;
      background: rgba(28,27,24,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 8px 16px;
      position: relative;
      transition: color 0.2s;
      color: var(--hint);
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
    }

    .nav-item .nav-icon { font-size: 18px; line-height: 1; }
    .nav-item .nav-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
    }

    .nav-item::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 20px;
      height: 2px;
      background: var(--gold);
      transition: transform 0.2s;
    }

    .nav-item.active { color: var(--gold); }
    .nav-item.active::after { transform: translateX(-50%) scaleX(1); }

    /* ── Export btn ── */
    .export-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--hint);
      padding: 4px 8px;
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.15s;
    }
    .export-btn:hover { color: var(--gold); }

    /* ── Import btn ── */
    .import-btn {
      display: block;
      width: 100%;
      border: none;
      padding: 8px;
      background: transparent;
      color: var(--hint);
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.06em;
      cursor: pointer;
      margin-top: 24px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .import-btn:hover { opacity: 0.4; }

    /* Records misc */
    .date-divider .line { background: var(--line); opacity: 1; }
    .record-delete { color: var(--hint); }
    .record-thumb { border-radius: 2px; }
    .day-total strong { color: var(--ink); }
    .empty-state { color: var(--hint); }
    .peak-tag { color: var(--warn); }

    /* ── Import btn ── */
    .import-btn {
      display: block;
      width: 100%;
      border: none;
      padding: 6px;
      background: transparent;
      color: var(--hint);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      cursor: pointer;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .import-btn:hover { opacity: 0.5; }
  </style>
</head>
<body>
  <div class="app" id="app">

    <!-- ═══ Tab 1: 首页 ═══ -->
    <div class="tab-page active" id="tabHome">
      <header class="header">
        <div class="brand">my <em>budget</em></div>
        <div class="header-right">
          <div class="date-badge" id="todayBadge"></div>
          <div class="month-nav">
            <button type="button" id="prevMonth" aria-label="上个月">‹</button>

          </div>
        </div>
      </header>

      <div class="pills" id="pills"></div>

      <div class="hero">

        <div class="hero-label">REMAINING</div>

        <div class="hero-sub" id="heroSub"></div>
        <div class="progress-track">
          <div class="progress-fill" id="heroProgress" style="width:0%"></div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">今日消费</div>
          <div class="stat-value num" id="statToday">¥0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">本月累计</div>
          <div class="stat-value num" id="statMonth">¥0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">01 个人提升</div>
          <div class="stat-value num" id="statCat01">¥0</div>
          <div class="stat-extra" id="statRollover"></div>
        </div>
      </div>

      <div class="banners" id="banners"></div>
    </div>

    <!-- ═══ Tab 2: 预算 ═══ -->
    <div class="tab-page" id="tabBudget">

      <div class="monthly-total">
        <div>
          <div class="label">本月总支出</div>
          <div class="value num" id="totalSpent">¥0</div>
        </div>
        <div class="remain" style="text-align:right">

        </div>
      </div>
    </div>

    <!-- ═══ Tab 3: 记录 ═══ -->
    <div class="tab-page" id="tabRecords">
      <div class="section-title-row">
        <span class="section-title">消费记录</span>
        <button type="button" class="export-btn" id="exportBtn">⬇ 导出 JSON</button>
      </div>
      <div id="recordsList"></div>
    </div>

    <!-- ═══ Tab 4: 记账 ═══ -->
    <div class="tab-page" id="tabAdd">
      <div class="add-section">
        <div class="add-title">记录消费</div>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="imageInput" accept="image/*">
          <span id="uploadText">📷 点击上传消费截图</span>
          <img id="uploadPreview" style="display:none" alt="预览">
        </div>
        <div class="form-group">
          <label>消费描述</label>
          <input type="text" class="form-input" id="descInput" placeholder="例如：Tims咖啡">
        </div>
        <div class="form-group">
          <label>金额（元）</label>
          <input type="number" class="form-input amount" id="amountInput" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>类目</label>
          <div class="cat-buttons" id="catButtons"></div>
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" class="form-input" id="dateInput">
        </div>
        <button type="button" class="submit-btn" id="submitBtn">记录这笔消费</button>
      </div>

      <button type="button" class="import-btn" id="importBtn">↻ 导入历史数据</button>
      <input type="file" id="jsonFileInput" accept=".json" style="display:none">
    </div>

    <!-- ═══ 底部导航 ═══ -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="tabHome">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">首页</span>
      </button>
      <button class="nav-item" data-tab="tabBudget">
        <span class="nav-icon">📊</span>
        <span class="nav-label">预算</span>
      </button>
      <button class="nav-item" data-tab="tabRecords">
        <span class="nav-icon">📋</span>
        <span class="nav-label">记录</span>
      </button>
      <button class="nav-item" data-tab="tabAdd">
        <span class="nav-icon">✏️</span>
        <span class="nav-label">记账</span>
      </button>
    </nav>
  </div>

  <script>
    const STORAGE_KEY = 'budget_app_data';

    const CATS = {
      '01': { name: '个人提升', sub: '健身课、活动、运动课程等', color: 'purple', budget: 600 },
      '02': { name: '取悦自己', sub: '看电影、买衣服、精神愉悦消费', color: 'coral', budget: 500 },
      '03': { name: '生存消费', sub: '吃饭、交通、日常开销', color: 'sage', budget: 1500 },
      '04': { name: '其他', sub: '礼物、杂项', color: 'amber', budget: 400 }
    };

    const TOTAL_BUDGET = 3000;
    const WEEKDAYS = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

    let data = loadData();
    let selectedCat = '03';
    let pendingImage = null;
    let currentTab = 'tabHome';

    function defaultData() {
      return {
        currentMonth: formatMonth(new Date()),
        monthlyBudgets: { '01': 600, '02': 500, '03': 1500, '04': 400 },
        cat01Rollover: 0,
        records: []
      };
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      return defaultData();
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function formatMonth(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    }

    function parseMonth(str) {
      const [y, m] = str.split('-').map(Number);
      return new Date(y, m - 1, 1);
    }

    function monthLabelCN(str) {
      const months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
      const m = parseInt(str.split('-')[1], 10);
      return months[m - 1];
    }

    function formatMoney(n) {
      const fixed = Math.round(n * 100) / 100;
      const parts = fixed.toFixed(2).split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return '¥' + parts.join('.');
    }

    function formatDateCN(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${d.getMonth() + 1}月${dd}日 · ${WEEKDAYS[d.getDay()]}`;
    }

    function formatDateShort(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    function recordsInMonth(month) {
      return data.records.filter(r => r.date.startsWith(month));
    }

    function spentByCat(month, cat) {
      return recordsInMonth(month)
        .filter(r => r.cat === cat)
        .reduce((s, r) => s + r.amount, 0);
    }

    function totalSpentInMonth(month) {
      return recordsInMonth(month).reduce((s, r) => s + r.amount, 0);
    }

    function getAllMonths() {
      const months = new Set([data.currentMonth]);
      data.records.forEach(r => months.add(r.date.slice(0, 7)));
      return Array.from(months).sort();
    }

    function getCat01Rollover(month) {
      const allMonths = getAllMonths();
      const earliest = allMonths[0];
      if (month <= earliest) return 0;

      let rollover = 0;
      let cur = parseMonth(earliest);
      const target = parseMonth(month);

      while (formatMonth(cur) < month) {
        const key = formatMonth(cur);
        const budget01 = CATS['01'].budget + rollover;
        const spent01 = spentByCat(key, '01');
        const remain = budget01 - spent01;
        rollover = remain > 0 ? remain : 0;
        cur.setMonth(cur.getMonth() + 1);
      }
      return rollover;
    }

    function getCatBudget(month, cat) {
      if (cat === '01') {
        return CATS['01'].budget + getCat01Rollover(month);
      }
      return CATS[cat].budget;
    }

    function getTotalBudget(month) {
      return Object.keys(CATS).reduce((s, c) => s + getCatBudget(month, c), 0);
    }

    function shiftMonth(str, delta) {
      const d = parseMonth(str);
      d.setMonth(d.getMonth() + delta);
      return formatMonth(d);
    }

    // ── Tab switching ──
    function switchTab(tabId) {
      currentTab = tabId;
      document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => {
        n.classList.toggle('active', n.dataset.tab === tabId);
      });
      if (tabId === 'tabAdd') { initCatButtons(); }
      if (tabId === 'tabRecords') { renderRecords(data.currentMonth); }
    }

    // ── Main render ──
    function render() {
      const month = data.currentMonth;
      const rollover = getCat01Rollover(month);
      const totalBudget = getTotalBudget(month);
      const totalSpent = totalSpentInMonth(month);
      const totalRemain = totalBudget - totalSpent;
      const spentPct = totalBudget > 0 ? Math.min(100, (totalSpent / totalBudget) * 100) : 0;

      const todayStr = new Date().toISOString().slice(0, 10);
      const todaySpent = data.records
        .filter(r => r.date === todayStr)
        .reduce((s, r) => s + r.amount, 0);

      const recordDays = new Set(recordsInMonth(month).map(r => r.date)).size;

      // Today badge
      const now = new Date();
      const monthsEN = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      document.getElementById('todayBadge').textContent =
        `${monthsEN[now.getMonth()]} ${now.getDate()} · ${now.getFullYear()}`;
      document.getElementById('monthLabel').textContent = monthLabelCN(month);

      // Pills
      document.getElementById('pills').innerHTML = `
        <span class="pill"><strong>${monthLabelCN(month)}</strong></span>
        <span class="pill">总预算 <strong>${formatMoney(totalBudget)}</strong></span>
        <span class="pill">已记录 <strong>${recordDays}</strong> 天</span>
      `;

      // Hero
      document.getElementById('heroRemaining').textContent = formatMoney(Math.max(0, totalRemain));
      document.getElementById('heroSub').textContent =
        `已花 ${formatMoney(totalSpent)} · 剩余 ${totalBudget > 0 ? Math.round((totalRemain / totalBudget) * 100) : 0}%`;
      document.getElementById('heroProgress').style.width = spentPct + '%';

      // Stats
      document.getElementById('statToday').textContent = formatMoney(todaySpent);
      document.getElementById('statMonth').textContent = formatMoney(totalSpent);
      document.getElementById('statCat01').textContent = formatMoney(spentByCat(month, '01'));
      document.getElementById('statRollover').textContent =
        rollover > 0 ? `结转 ${formatMoney(rollover)}` : '';

      // Category cards
      document.getElementById('catCards').innerHTML = Object.entries(CATS).map(([id, cat]) => {
        const budget = getCatBudget(month, id);
        const spent = spentByCat(month, id);
        const remain = budget - spent;
        const pct = budget > 0 ? Math.min(100, (spent / budget) * 100) : 0;
        const rolloverNote = id === '01' && rollover > 0
          ? `（含结转 ${formatMoney(rollover)}）`
          : '';

        // 进度条分档
        let progressClass = 'zero';
        if (pct > 0 && pct <= 50)  progressClass = 'low';
        else if (pct > 50 && pct <= 80) progressClass = 'mid';
        else if (pct > 80) progressClass = 'high';

        // 余额分档
        const remainRatio = budget > 0 ? remain / budget : 1;
        let badgeClass = 'remain-badge';
        if (remain < 0) badgeClass += ' over';
        else if (remainRatio < 0.2) badgeClass += ' low';

        const remainLabel = remain < 0
          ? `超支 ${formatMoney(-remain)}`
          : `余 ${formatMoney(remain)}`;

        // 该类目当月记录
        const catRecords = recordsInMonth(month)
          .filter(r => r.cat === id)
          .sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);

        let recordsHtml = catRecords.length === 0
          ? '<div class="cat-expand-empty">暂无消费记录</div>'
          : catRecords.map(r => `
            <div class="cat-expand-item">
              <div class="cat-expand-desc">
                <div>${escapeHtml(r.desc)}</div>
                <div class="cat-expand-date">${formatDateShort(r.date)}</div>
              </div>
              <div class="cat-expand-amount">${formatMoney(r.amount)}</div>
            </div>
          `).join('');

        // 点阵进度条：20个点
        const dotCount = 20;
        const filledDots = Math.round(pct / 100 * dotCount);
        let dotsHtml = '<div class="progress-dots">';
        for (let i = 0; i < dotCount; i++) {
          const on = i < filledDots;
          const cls = on ? ('on' + (progressClass === 'high' ? ' high' : '')) : '';
          dotsHtml += `<span class="pdot ${cls}"></span>`;
        }
        dotsHtml += '</div>';

        return `
          <div class="cat-card" data-cat="${id}">
            <div class="cat-header">
              <div class="cat-badge ${cat.color}">${id}</div>
              <div class="cat-info">
                <div class="cat-name">${cat.name}</div>
              </div>
              <div class="cat-amounts">
                <span class="spent">${formatMoney(spent)}</span>
                <span class="budget">/ ${formatMoney(budget)}${rolloverNote}</span>
              </div>
            </div>
            <div class="cat-sub">${cat.sub}</div>
            <div class="cat-footer">
              ${dotsHtml}
              <span class="${badgeClass}">${remainLabel}</span>
              <span class="cat-expand-chevron">›</span>
            </div>
            <div class="cat-expand">
              <div class="cat-expand-inner">${recordsHtml}</div>
              <div class="cat-expand-fade"></div>
            </div>
          </div>
        `;
      }).join('');

      // 展开/收起
      document.querySelectorAll('.cat-card').forEach(card => {
        card.addEventListener('click', () => {
          const expand = card.querySelector('.cat-expand');
          const chevron = card.querySelector('.cat-expand-chevron');
          const isOpen = expand.classList.contains('open');
          expand.classList.toggle('open', !isOpen);
          chevron.classList.toggle('open', !isOpen);
        });
      });

      // Banners
      const banners = [];
      const remain02 = getCatBudget(month, '02') - spentByCat(month, '02');
      if (remain02 < 200) {
        banners.push(`<div class="banner warn">⚠️ 取悦自己预算剩余不足 ¥200，当前余 ${formatMoney(Math.max(0, remain02))}，请适度消费</div>`);
      }
      const remain01 = getCatBudget(month, '01') - spentByCat(month, '01');
      banners.push(`<div class="banner encourage">💜 个人提升还剩 ${formatMoney(Math.max(0, remain01))}，投资自己永远不亏，去上课吧！</div>`);
      document.getElementById('banners').innerHTML = banners.slice(0, 2).join('');

      // Records
      renderRecords(month);

      // Monthly total
      document.getElementById('totalSpent').textContent = formatMoney(totalSpent);
      document.getElementById('totalRemain').textContent = formatMoney(Math.max(0, totalRemain));

      // Update stored rollover for current month
      data.cat01Rollover = rollover;
      saveData();
    }

    function renderRecords(month) {
      const records = recordsInMonth(month).sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
      const container = document.getElementById('recordsList');

      if (records.length === 0) {
        container.innerHTML = '<div class="empty-state">还没有任何消费记录，添加第一笔吧 ↗</div>';
        return;
      }

      const todayStr = new Date().toISOString().slice(0, 10);

      // Find peak day
      const dayTotals = {};
      records.forEach(r => {
        dayTotals[r.date] = (dayTotals[r.date] || 0) + r.amount;
      });
      let peakDate = null;
      let peakAmount = 0;
      Object.entries(dayTotals).forEach(([date, amt]) => {
        if (amt > peakAmount) { peakAmount = amt; peakDate = date; }
      });

      // Group by date
      const groups = {};
      records.forEach(r => {
        if (!groups[r.date]) groups[r.date] = [];
        groups[r.date].push(r);
      });

      const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

      container.innerHTML = sortedDates.map(date => {
        const items = groups[date];
        const dayTotal = dayTotals[date];
        const isPeak = date === peakDate && sortedDates.length > 1;
        const isToday = date === todayStr;
        const peakTag = isPeak ? '<span class="peak-tag">🔺本月最高</span>' : '';
        const openClass = isToday ? ' open' : '';

        const itemsHtml = items.map(r => {
          const cat = CATS[r.cat];
          const thumb = r.imageBase64
            ? `<img class="record-thumb" src="${r.imageBase64}" alt="">`
            : '';
          return `
            <div class="record-item">
              <div class="record-dot ${cat.color}"></div>
              ${thumb}
              <div class="record-info">
                <div class="record-desc">${escapeHtml(r.desc)}</div>
                <div class="record-meta">${formatDateShort(r.date)} · ${cat.name}</div>
              </div>
              <div class="record-amount">${formatMoney(r.amount)}</div>
              <button class="record-delete" data-id="${r.id}" title="删除">🗑️</button>
            </div>
          `;
        }).join('');

        return `
          <div class="date-group">
            <div class="date-divider" data-date="${date}">
              <span class="date-text">${formatDateCN(date)}</span>${peakTag}
              <div class="line"></div>
              <span class="day-sum">${formatMoney(dayTotal)}</span>
              <span class="chevron${openClass}">›</span>
            </div>
            <div class="records-body${openClass}">
              ${itemsHtml}
            </div>
          </div>
        `;
      }).join('');

      // Collapse/expand
      container.querySelectorAll('.date-divider').forEach(div => {
        div.addEventListener('click', () => {
          const body = div.nextElementSibling;
          const chevron = div.querySelector('.chevron');
          const isOpen = body.classList.contains('open');
          body.classList.toggle('open', !isOpen);
          chevron.classList.toggle('open', !isOpen);
        });
      });

      container.querySelectorAll('.record-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          if (confirm('确定删除这条消费记录吗？')) {
            data.records = data.records.filter(r => String(r.id) !== String(id));
            saveData();
            render();
          }
        });
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function initCatButtons() {
      const container = document.getElementById('catButtons');
      container.innerHTML = Object.entries(CATS).map(([id, cat]) =>
        `<button type="button" class="cat-btn ${id === selectedCat ? 'selected ' + cat.color : ''}" data-cat="${id}">
          ${id} ${cat.name}
        </button>`
      ).join('');

      container.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedCat = btn.dataset.cat;
          container.querySelectorAll('.cat-btn').forEach(b => {
            b.className = 'cat-btn';
            if (b.dataset.cat === selectedCat) {
              b.classList.add('selected', CATS[selectedCat].color);
            }
          });
        });
      });
    }

    function clearForm() {
      document.getElementById('descInput').value = '';
      document.getElementById('amountInput').value = '';
      pendingImage = null;
      document.getElementById('uploadPreview').style.display = 'none';
      document.getElementById('uploadText').style.display = '';
      document.getElementById('imageInput').value = '';
      document.getElementById('dateInput').value = new Date().toISOString().slice(0, 10);
    }

    function addRecord() {
      const desc = document.getElementById('descInput').value.trim();
      const amount = parseFloat(document.getElementById('amountInput').value);
      const date = document.getElementById('dateInput').value;

      if (!desc) { alert('请填写消费描述'); return; }
      if (!amount || amount <= 0) { alert('请填写有效金额'); return; }
      if (!date) { alert('请选择日期'); return; }

      const record = {
        id: Date.now(),
        date,
        desc,
        amount: Math.round(amount * 100) / 100,
        cat: selectedCat,
        emoji: '',
        imageBase64: pendingImage
      };

      data.records.push(record);
      const recordMonth = date.slice(0, 7);
      data.currentMonth = recordMonth;

      saveData();
      render();
      clearForm();
      // 自动跳转到记录Tab
      switchTab('tabRecords');
    }

    // ── Events ──

    // Bottom nav
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // Month navigation
    document.getElementById('prevMonth').addEventListener('click', () => {
      data.currentMonth = shiftMonth(data.currentMonth, -1);
      saveData();
      render();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
      data.currentMonth = shiftMonth(data.currentMonth, 1);
      saveData();
      render();
    });

    document.getElementById('submitBtn').addEventListener('click', addRecord);

    // Image upload
    const uploadZone = document.getElementById('uploadZone');
    const imageInput = document.getElementById('imageInput');
    uploadZone.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', () => {
      const file = imageInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        pendingImage = e.target.result;
        const preview = document.getElementById('uploadPreview');
        preview.src = pendingImage;
        preview.style.display = 'block';
        document.getElementById('uploadText').style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    // Export
    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `budget_backup_${data.currentMonth}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // Import
    const jsonFileInput = document.getElementById('jsonFileInput');
    document.getElementById('importBtn').addEventListener('click', () => {
      if (!confirm('确定要导入历史账单数据吗？请选择本地 data.json 文件。')) return;
      jsonFileInput.click();
    });
    jsonFileInput.addEventListener('change', () => {
      const file = jsonFileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const json = JSON.parse(e.target.result);
          if (!json.records || !Array.isArray(json.records)) {
            alert('JSON 格式不正确，缺少 records 数组');
            return;
          }
          const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
          const existingIds = new Set((existing.records || []).map(r => r.id));
          const newRecords = json.records.filter(r => !existingIds.has(r.id));
          const merged = {
            currentMonth: json.currentMonth || existing.currentMonth,
            monthlyBudgets: json.monthlyBudgets || existing.monthlyBudgets || { '01': 600, '02': 500, '03': 1500, '04': 400 },
            cat01Rollover: existing.cat01Rollover || 0,
            records: [...newRecords, ...(existing.records || [])]
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
          location.reload();
        } catch (err) {
          alert('JSON 解析失败：' + err.message);
        }
      };
      reader.readAsText(file);
    });

    // Init
    document.getElementById('dateInput').value = new Date().toISOString().slice(0, 10);
    render();
  </script>
</body>
</html>
