<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>my budget</title>
  <style>
    :root {
      --bg: #F5F5F7;
      --card-bg: rgba(255,255,255,0.72);
      --card-border: 1px solid rgba(255,255,255,0.8);
      --card-shadow: 0 2px 8px rgba(0,0,0,0.04);
      --ink: #1D1D1F;
      --secondary: #6E6E73;
      --tertiary: #AEAEB2;
      --accent: #0066CC;
      --warn: #FF3B30;
      --divider: rgba(0,0,0,0.08);
      --radius: 18px;
      --radius-sm: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
      font-size: 15px;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      min-height: 100vh;
    }

    /* Tab page */
    .tab-page {
      display: none;
      padding: 20px 16px 100px;
      min-height: 100vh;
    }
    .tab-page.active { display: block; }

    /* Typography */
    .hero-num {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: -0.5px;
      color: var(--ink);
    }
    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.3px;
    }
    .card-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--ink);
    }
    .body-text { font-size: 15px; font-weight: 400; color: var(--ink); }
    .sub-text { font-size: 13px; color: var(--secondary); }
    .hint-text { font-size: 11px; color: var(--tertiary); }
    .mono-num { font-variant-numeric: tabular-nums; }

    /* Card */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
    }

    /* Progress bar */
    .progress-track {
      height: 3px;
      border-radius: 99px;
      background: var(--divider);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transition: width 0.4s ease;
    }
    .progress-fill.warn { background: var(--warn); }

    /* Cat badge */
    .cat-num {
      font-size: 13px;
      font-weight: 300;
      color: var(--tertiary);
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      background: var(--ink);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.8; }

    .cat-btn {
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 99px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      background: transparent;
      color: var(--secondary);
      min-height: 44px;
      transition: all 0.15s;
      text-align: center;
    }
    .cat-btn.selected {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    /* Bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 64px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--divider);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      padding: 6px 16px;
      transition: color 0.15s;
      color: var(--tertiary);
      background: none;
      border: none;
      font-family: inherit;
    }
    .nav-item .nav-icon { font-size: 22px; line-height: 1; }
    .nav-item .nav-label { font-size: 10px; font-weight: 500; }
    .nav-item.active { color: var(--accent); }

    /* Home tab */
    .home-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .brand {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--ink);
    }
    .today-date {
      font-size: 13px;
      color: var(--secondary);
      text-align: right;
      line-height: 1.6;
    }

    .month-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .month-picker button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--secondary);
      font-size: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .month-picker button:active { background: rgba(0,0,0,0.06); }
    .month-picker-label {
      font-size: 17px;
      font-weight: 600;
      color: var(--ink);
      padding: 8px 24px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 99px;
      min-width: 80px;
      text-align: center;
    }

    .hero-card {
      padding: 24px 20px 20px;
      margin-bottom: 14px;
    }
    .hero-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--secondary);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .hero-amount { margin-bottom: 4px; }
    .hero-sub {
      font-size: 13px;
      color: var(--secondary);
      margin-bottom: 16px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 14px 12px;
      text-align: center;
    }
    .stat-label {
      font-size: 11px;
      color: var(--tertiary);
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.3px;
    }
    .stat-extra {
      font-size: 10px;
      color: var(--accent);
      margin-top: 2px;
    }

    .banner {
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.45;
      background: rgba(0,102,204,0.06);
      color: var(--accent);
      margin-bottom: 10px;
    }
    .banner.warn {
      background: rgba(255,59,48,0.06);
      color: var(--warn);
    }

    /* Budget tab */
    .budget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .edit-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--secondary);
    }
    .edit-btn:active { background: rgba(0,0,0,0.06); }

    .cat-card-item {
      padding: 18px;
      margin-bottom: 10px;
    }
    .cat-card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .cat-card-info { flex: 1; min-width: 0; }
    .cat-card-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 2px;
    }
    .cat-card-sub {
      font-size: 13px;
      color: var(--secondary);
    }
    .cat-card-amounts {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--secondary);
    }
    .cat-card-amounts .spent {
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
    }
    .cat-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .remain-tag {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 99px;
      background: rgba(0,0,0,0.04);
      color: var(--secondary);
    }
    .remain-tag.warn {
      background: rgba(255,59,48,0.08);
      color: var(--warn);
    }

    /* Budget edit modal */
    .edit-panel {
      padding: 24px 20px;
      margin-bottom: 14px;
    }
    .edit-panel .edit-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .edit-panel .cat-num { width: 24px; flex-shrink: 0; }
    .edit-panel .edit-name {
      flex: 1;
      font-size: 14px;
      color: var(--ink);
    }
    .edit-panel input {
      width: 100px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 15px;
      text-align: right;
      background: #fff;
      color: var(--ink);
      outline: none;
    }
    .edit-panel input:focus { border-color: var(--accent); }
    .edit-panel .edit-total {
      text-align: right;
      font-size: 13px;
      color: var(--secondary);
      margin-bottom: 16px;
      padding-right: 4px;
    }
    .edit-panel .btn-row {
      display: flex;
      gap: 10px;
    }
    .btn-secondary {
      flex: 1;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: var(--radius-sm);
      padding: 12px;
      background: transparent;
      color: var(--ink);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      min-height: 44px;
      transition: all 0.15s;
    }
    .btn-secondary:active { background: rgba(0,0,0,0.04); }
    .btn-save {
      flex: 1;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px;
      background: var(--ink);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: opacity 0.15s;
    }
    .btn-save:active { opacity: 0.8; }

    /* Records tab */
    .records-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .export-btn {
      background: none;
      border: none;
      font-size: 17px;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--secondary);
    }
    .export-btn:active { background: rgba(0,0,0,0.06); }

    .date-group { margin-bottom: 8px; }
    .date-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 4px;
      cursor: pointer;
      user-select: none;
    }
    .date-divider .date-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
    }
    .date-divider .date-sub {
      font-size: 12px;
      color: var(--tertiary);
      white-space: nowrap;
    }
    .date-divider .dash {
      flex: 1;
      height: 1px;
      background: var(--divider);
    }
    .date-divider .day-total {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
    }
    .date-divider .chevron {
      font-size: 12px;
      color: var(--tertiary);
      transition: transform 0.2s;
    }
    .date-divider .chevron.open { transform: rotate(90deg); }

    .records-list { display: none; padding-bottom: 4px; }
    .records-list.open { display: block; }

    .record-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 4px 10px 8px;
      border-left: 3px solid transparent;
      margin-left: 0;
    }
    .record-info { flex: 1; min-width: 0; }
    .record-desc {
      font-size: 15px;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .record-cat {
      font-size: 13px;
      color: var(--tertiary);
      margin-top: 2px;
    }
    .record-amount {
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      flex-shrink: 0;
    }
    .record-delete {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      opacity: 0;
      padding: 6px;
      border-radius: 8px;
      transition: opacity 0.15s;
      color: var(--tertiary);
    }
    .record-item:hover .record-delete,
    .record-item:active .record-delete { opacity: 1; }

    .monthly-total-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      margin-top: 14px;
    }
    .monthly-total-bar .tt-label {
      font-size: 11px;
      color: var(--tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .monthly-total-bar .tt-value {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.3px;
    }
    .tt-remain .tt-value { color: var(--accent); }

    /* Add tab */
    .add-form {
      padding: 0 2px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--secondary);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: var(--radius-sm);
      padding: 14px;
      font-family: inherit;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      background: rgba(255,255,255,0.72);
      min-height: 48px;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input.amount {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: -0.5px;
      text-align: center;
    }
    .cat-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* Import button */
    .import-btn {
      display: block;
      width: 100%;
      border: none;
      padding: 6px;
      background: transparent;
      color: var(--tertiary);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.2s;
      position: sticky;
      bottom: 80px;
    }
    .import-btn:hover { opacity: 0.5; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--tertiary);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="app" id="app">

    <!-- ===== Tab 1: 首页 ===== -->
    <div class="tab-page active" id="tabHome">
      <div class="home-header">
        <div class="brand">my budget</div>
        <div class="today-date" id="todayBadge"></div>
      </div>
      <div class="month-picker">
        <button type="button" id="prevMonth1" aria-label="上月">‹</button>
        <span class="month-picker-label" id="monthLabel1"></span>
        <button type="button" id="nextMonth1" aria-label="下月">›</button>
      </div>
      <div class="hero-card card">
        <div class="hero-label">REMAINING</div>
        <div class="hero-amount hero-num" id="heroRemaining">¥0</div>
        <div class="hero-sub" id="heroSub"></div>
        <div class="progress-track">
          <div class="progress-fill" id="heroProgress" style="width:0%"></div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">今日消费</div>
          <div class="stat-value mono-num" id="statToday">¥0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">本月累计</div>
          <div class="stat-value mono-num" id="statMonth">¥0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">01 个人提升</div>
          <div class="stat-value mono-num" id="statCat01">¥0</div>
          <div class="stat-extra" id="statRollover"></div>
        </div>
      </div>
      <div id="banners"></div>
    </div>

    <!-- ===== Tab 2: 预算 ===== -->
    <div class="tab-page" id="tabBudget">
      <div class="budget-header">
        <div class="page-title">预算</div>
        <button type="button" class="edit-btn" id="editBudgetBtn" title="编辑">✎</button>
      </div>
      <div class="month-picker">
        <button type="button" id="prevMonth2" aria-label="上月">‹</button>
        <span class="month-picker-label" id="monthLabel2"></span>
        <button type="button" id="nextMonth2" aria-label="下月">›</button>
      </div>
      <div id="editPanel" style="display:none"></div>
      <div id="catCards"></div>
    </div>

    <!-- ===== Tab 3: 记录 ===== -->
    <div class="tab-page" id="tabRecords">
      <div class="records-header">
        <div class="page-title">记录</div>
        <button type="button" class="export-btn" id="exportBtn" title="导出数据">⬇</button>
      </div>
      <div class="month-picker">
        <button type="button" id="prevMonth3" aria-label="上月">‹</button>
        <span class="month-picker-label" id="monthLabel3"></span>
        <button type="button" id="nextMonth3" aria-label="下月">›</button>
      </div>
      <div id="recordsList"></div>
      <div class="monthly-total-bar card" id="monthlyTotalBar" style="display:none">
        <div>
          <div class="tt-label">本月总支出</div>
          <div class="tt-value mono-num" id="totalSpent">¥0</div>
        </div>
        <div class="tt-remain" style="text-align:right">
          <div class="tt-label">剩余预算</div>
          <div class="tt-value mono-num" id="totalRemain">¥0</div>
        </div>
      </div>
    </div>

    <!-- ===== Tab 4: 记账 ===== -->
    <div class="tab-page" id="tabAdd">
      <div class="page-title" style="margin-bottom:24px">记一笔</div>
      <div class="add-form">
        <div class="form-group">
          <label>消费描述</label>
          <input type="text" class="form-input" id="descInput" placeholder="今天花了什么？">
        </div>
        <div class="form-group">
          <label>金额（元）</label>
          <input type="number" class="form-input amount" id="amountInput" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" class="form-input" id="dateInput">
        </div>
        <div class="form-group">
          <label>类目</label>
          <div class="cat-buttons" id="catButtons"></div>
        </div>
        <button type="button" class="btn-primary" id="submitBtn">记录</button>
      </div>

      <button type="button" class="import-btn" id="importBtn">↻ 导入历史数据</button>
      <input type="file" id="jsonFileInput" accept=".json" style="display:none">
    </div>

    <!-- ===== 底部导航 ===== -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="tabHome">
        <span class="nav-icon">◉</span>
        <span class="nav-label">首页</span>
      </button>
      <button class="nav-item" data-tab="tabBudget">
        <span class="nav-icon">◒</span>
        <span class="nav-label">预算</span>
      </button>
      <button class="nav-item" data-tab="tabRecords">
        <span class="nav-icon">☰</span>
        <span class="nav-label">记录</span>
      </button>
      <button class="nav-item" data-tab="tabAdd">
        <span class="nav-icon">+</span>
        <span class="nav-label">记账</span>
      </button>
    </nav>
  </div>

  <script>
    const STORAGE_KEY = 'budget_app_data';

    const CATS = {
      '01': { name: '个人提升', sub: '健身课、活动、运动课程等', budget: 600 },
      '02': { name: '取悦自己', sub: '看电影、买衣服、精神愉悦消费', budget: 500 },
      '03': { name: '生存消费', sub: '吃饭、交通、日常开销', budget: 1500 },
      '04': { name: '其他',     sub: '礼物、杂项', budget: 400 }
    };

    const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
    let data = loadData();
    let selectedCat = '03';
    let editingBudget = false;

    function defaultData() {
      return {
        currentMonth: formatMonth(new Date()),
        monthlyBudgets: { '01': 600, '02': 500, '03': 1500, '04': 400 },
        cat01Rollover: 0,
        records: []
      };
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      return defaultData();
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function formatMonth(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    }

    function parseMonth(str) {
      const [y, m] = str.split('-').map(Number);
      return new Date(y, m - 1, 1);
    }

    function monthLabelCN(str) {
      const months = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
      const m = parseInt(str.split('-')[1], 10);
      return months[m - 1];
    }

    function formatMoney(n) {
      const fixed = Math.round(n * 100) / 100;
      const parts = fixed.toFixed(2).split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      return '¥' + parts.join('.');
    }

    function formatDateCN(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${d.getMonth() + 1}月${d.getDate()}日 · ${WEEKDAYS[d.getDay()]}`;
    }

    function formatDateShort(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    function recordsInMonth(month) {
      return data.records.filter(r => r.date.startsWith(month));
    }

    function spentByCat(month, cat) {
      return recordsInMonth(month).filter(r => r.cat === cat).reduce((s, r) => s + r.amount, 0);
    }

    function totalSpentInMonth(month) {
      return recordsInMonth(month).reduce((s, r) => s + r.amount, 0);
    }

    function getAllMonths() {
      const months = new Set([data.currentMonth]);
      data.records.forEach(r => months.add(r.date.slice(0, 7)));
      return Array.from(months).sort();
    }

    function getCat01Rollover(month) {
      const allMonths = getAllMonths();
      const earliest = allMonths[0];
      if (month <= earliest) return 0;
      let rollover = 0;
      const cur = parseMonth(earliest);
      const target = parseMonth(month);
      while (formatMonth(cur) < month) {
        const key = formatMonth(cur);
        const budget01 = CATS['01'].budget + rollover;
        const spent01 = spentByCat(key, '01');
        const remain = budget01 - spent01;
        rollover = remain > 0 ? remain : 0;
        cur.setMonth(cur.getMonth() + 1);
      }
      return rollover;
    }

    function getCatBudget(month, cat) {
      const budgets = data.monthlyBudgets || CATS;
      if (cat === '01') {
        return (budgets['01'] || CATS['01'].budget) + getCat01Rollover(month);
      }
      return budgets[cat] || CATS[cat].budget;
    }

    function getTotalBudget(month) {
      return Object.keys(CATS).reduce((s, c) => s + getCatBudget(month, c), 0);
    }

    function shiftMonth(str, delta) {
      const d = parseMonth(str);
      d.setMonth(d.getMonth() + delta);
      return formatMonth(d);
    }

    // ──────────── Tab switching ────────────
    let currentTab = 'tabHome';

    function switchTab(tabId) {
      currentTab = tabId;
      document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => {
        n.classList.toggle('active', n.dataset.tab === tabId);
      });
      renderCurrentTab();
    }

    function renderCurrentTab() {
      switch (currentTab) {
        case 'tabHome': renderHome(); break;
        case 'tabBudget': renderBudget(); break;
        case 'tabRecords': renderRecords(); break;
        case 'tabAdd': renderAdd(); break;
      }
    }

    // ──────────── Home tab ────────────
    function renderHome() {
      const month = data.currentMonth;
      const rollover = getCat01Rollover(month);
      const totalBudget = getTotalBudget(month);
      const totalSpent = totalSpentInMonth(month);
      const totalRemain = totalBudget - totalSpent;
      const spentPct = totalBudget > 0 ? Math.min(100, (totalSpent / totalBudget) * 100) : 0;

      const todayStr = new Date().toISOString().slice(0, 10);
      const todaySpent = data.records.filter(r => r.date === todayStr).reduce((s, r) => s + r.amount, 0);

      const now = new Date();
      document.getElementById('todayBadge').textContent =
        `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;
      document.getElementById('monthLabel1').textContent = monthLabelCN(month);
      document.getElementById('monthLabel2').textContent = monthLabelCN(month);
      document.getElementById('monthLabel3').textContent = monthLabelCN(month);

      document.getElementById('heroRemaining').textContent = formatMoney(Math.max(0, totalRemain));
      document.getElementById('heroSub').textContent =
        `已花 ${formatMoney(totalSpent)} · 剩余 ${totalBudget > 0 ? Math.round((totalRemain / totalBudget) * 100) : 0}%`;
      const heroBar = document.getElementById('heroProgress');
      heroBar.style.width = spentPct + '%';
      heroBar.classList.toggle('warn', spentPct > 90);

      document.getElementById('statToday').textContent = formatMoney(todaySpent);
      document.getElementById('statMonth').textContent = formatMoney(totalSpent);
      document.getElementById('statCat01').textContent = formatMoney(spentByCat(month, '01'));
      document.getElementById('statRollover').textContent = rollover > 0 ? `结转 ${formatMoney(rollover)}` : '';

      // Banners
      const banners = [];
      const remain02 = getCatBudget(month, '02') - spentByCat(month, '02');
      if (remain02 < 200 && remain02 > 0) {
        banners.push(`<div class="banner warn">⚠ 取悦自己预算剩余不足 ${formatMoney(Math.max(0, remain02))}，请适度消费</div>`);
      }
      const remain01 = getCatBudget(month, '01') - spentByCat(month, '01');
      if (remain01 > 0) {
        banners.push(`<div class="banner">个人提升还剩 ${formatMoney(Math.max(0, remain01))}，投资自己永远不亏</div>`);
      }
      document.getElementById('banners').innerHTML = banners.join('');

      data.cat01Rollover = rollover;
      saveData();
    }

    // ──────────── Budget tab ────────────
    function renderBudget() {
      const month = data.currentMonth;
      const rollover = getCat01Rollover(month);

      if (editingBudget) {
        renderEditPanel(month);
      } else {
        document.getElementById('editPanel').style.display = 'none';
      }

      document.getElementById('catCards').innerHTML = Object.entries(CATS).map(([id, cat]) => {
        const budget = getCatBudget(month, id);
        const spent = spentByCat(month, id);
        const remain = budget - spent;
        const pct = budget > 0 ? Math.min(100, (spent / budget) * 100) : 0;
        const isOver = remain < 0;
        const rolloverNote = id === '01' && rollover > 0 ? `（含结转 ${formatMoney(rollover)}）` : '';

        return `
          <div class="cat-card-item card">
            <div class="cat-card-header">
              <span class="cat-num">${id}</span>
              <div class="cat-card-info">
                <div class="cat-card-name">${cat.name}</div>
                <div class="cat-card-sub">${cat.sub}</div>
              </div>
            </div>
            <div class="cat-card-amounts">
              <span class="spent">${formatMoney(spent)}</span>
              <span>/ ${formatMoney(budget)}${rolloverNote}</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill${isOver ? ' warn' : ''}" style="width:${pct}%"></div>
            </div>
            <div class="cat-card-footer" style="margin-top:10px">
              <span class="remain-tag${isOver ? ' warn' : ''}">
                ${isOver ? `超支 ${formatMoney(-remain)}` : `剩余 ${formatMoney(remain)}`}
              </span>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderEditPanel(month) {
      const current = data.monthlyBudgets || { '01': 600, '02': 500, '03': 1500, '04': 400 };
      const total = Object.values(current).reduce((s, v) => s + v, 0);
      document.getElementById('editPanel').style.display = 'block';
      document.getElementById('editPanel').innerHTML = `
        <div class="edit-panel card">
          ${Object.entries(CATS).map(([id, cat]) => `
            <div class="edit-row">
              <span class="cat-num">${id}</span>
              <span class="edit-name">${cat.name}</span>
              <input type="number" id="editBudget${id}" value="${current[id] || cat.budget}" min="0" step="10" placeholder="预算">
            </div>
          `).join('')}
          <div class="edit-total">合计预算：¥<span id="editTotal">${total.toLocaleString()}</span></div>
          <div class="btn-row">
            <button type="button" class="btn-secondary" id="cancelEdit">取消</button>
            <button type="button" class="btn-save" id="saveEdit">保存</button>
          </div>
        </div>
      `;

      // Live total
      Object.keys(CATS).forEach(id => {
        document.getElementById(`editBudget${id}`).addEventListener('input', () => {
          let sum = 0;
          Object.keys(CATS).forEach(k => {
            const v = parseInt(document.getElementById(`editBudget${k}`).value) || 0;
            sum += v;
          });
          document.getElementById('editTotal').textContent = sum.toLocaleString();
        });
      });

      document.getElementById('cancelEdit').addEventListener('click', () => {
        editingBudget = false;
        renderBudget();
      });

      document.getElementById('saveEdit').addEventListener('click', () => {
        const newBudgets = {};
        Object.keys(CATS).forEach(id => {
          newBudgets[id] = parseInt(document.getElementById(`editBudget${id}`).value) || CATS[id].budget;
        });
        data.monthlyBudgets = newBudgets;
        editingBudget = false;
        saveData();
        renderBudget();
        // Also refresh home if on same month
      });
    }

    // ──────────── Records tab ────────────
    function renderRecords() {
      const month = data.currentMonth;
      const records = recordsInMonth(month).sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
      const container = document.getElementById('recordsList');
      const totalBar = document.getElementById('monthlyTotalBar');

      const todayStr = new Date().toISOString().slice(0, 10);

      if (records.length === 0) {
        container.innerHTML = '<div class="empty-state">还没有消费记录</div>';
        totalBar.style.display = 'none';
      } else {
        // Group by date
        const groups = {};
        records.forEach(r => {
          if (!groups[r.date]) groups[r.date] = [];
          groups[r.date].push(r);
        });

        const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

        container.innerHTML = sortedDates.map(date => {
          const items = groups[date];
          const dayTotal = items.reduce((s, r) => s + r.amount, 0);
          const isToday = date === todayStr;
          const d = new Date(date + 'T00:00:00');
          const dateLabel = `${d.getMonth() + 1}月${d.getDate()}日`;
          const weekday = WEEKDAYS[d.getDay()];

          const itemsHtml = items.map(r => `
            <div class="record-item">
              <div class="record-info">
                <div class="record-desc">${escapeHtml(r.desc)}</div>
                <div class="record-cat">${CATS[r.cat].name}</div>
              </div>
              <div class="record-amount">${formatMoney(r.amount)}</div>
              <button class="record-delete" data-id="${r.id}" title="删除">✕</button>
            </div>
          `).join('');

          return `
            <div class="date-group">
              <div class="date-divider" data-date="${date}">
                <span class="date-text">${dateLabel}</span>
                <span class="date-sub">· ${weekday}</span>
                <span class="dash"></span>
                <span class="day-total">${formatMoney(dayTotal)}</span>
                <span class="chevron${isToday ? ' open' : ''}">›</span>
              </div>
              <div class="records-list${isToday ? ' open' : ''}">
                ${itemsHtml}
              </div>
            </div>
          `;
        }).join('');

        // Collapse/expand
        container.querySelectorAll('.date-divider').forEach(div => {
          div.addEventListener('click', () => {
            const list = div.nextElementSibling;
            const chevron = div.querySelector('.chevron');
            const isOpen = list.classList.contains('open');
            list.classList.toggle('open', !isOpen);
            chevron.classList.toggle('open', !isOpen);
          });
        });

        // Delete
        container.querySelectorAll('.record-delete').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;
            if (confirm('确定删除这条消费记录吗？')) {
              data.records = data.records.filter(r => String(r.id) !== String(id));
              saveData();
              renderAll();
            }
          });
        });

        // Monthly total
        const totalSpent = totalSpentInMonth(month);
        const totalRemain = getTotalBudget(month) - totalSpent;
        document.getElementById('totalSpent').textContent = formatMoney(totalSpent);
        document.getElementById('totalRemain').textContent = formatMoney(Math.max(0, totalRemain));
        totalBar.style.display = 'flex';
      }
    }

    // ──────────── Add tab ────────────
    function renderAdd() {
      // Cat buttons
      const catContainer = document.getElementById('catButtons');
      catContainer.innerHTML = Object.entries(CATS).map(([id, cat]) =>
        `<button type="button" class="cat-btn${id === selectedCat ? ' selected' : ''}" data-cat="${id}">
          ${id} ${cat.name}
        </button>`
      ).join('');

      catContainer.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedCat = btn.dataset.cat;
          catContainer.querySelectorAll('.cat-btn').forEach(b => {
            b.classList.toggle('selected', b.dataset.cat === selectedCat);
          });
        });
      });

      document.getElementById('dateInput').value = new Date().toISOString().slice(0, 10);

      // Submit — only bind once
      const submitBtn = document.getElementById('submitBtn');
      const newSubmit = submitBtn.cloneNode(true);
      submitBtn.parentNode.replaceChild(newSubmit, submitBtn);
      newSubmit.addEventListener('click', addRecord);
    }

    function addRecord() {
      const desc = document.getElementById('descInput').value.trim();
      const amount = parseFloat(document.getElementById('amountInput').value);
      const date = document.getElementById('dateInput').value;

      if (!desc) { alert('请填写消费描述'); return; }
      if (!amount || amount <= 0) { alert('请填写有效金额'); return; }
      if (!date) { alert('请选择日期'); return; }

      const record = {
        id: Date.now(),
        date,
        desc,
        amount: Math.round(amount * 100) / 100,
        cat: selectedCat,
        emoji: '',
        imageBase64: null
      };

      data.records.push(record);
      data.currentMonth = date.slice(0, 7);
      saveData();
      clearForm();
      switchTab('tabRecords');
    }

    function clearForm() {
      document.getElementById('descInput').value = '';
      document.getElementById('amountInput').value = '';
      document.getElementById('dateInput').value = new Date().toISOString().slice(0, 10);
      selectedCat = '03';
      renderAdd();
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderAll() {
      renderCurrentTab();
    }

    // ──────────── Events ────────────
    // Tab navigation
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // Month navigation (all 3 pickers)
    function bindMonthNav(prevId, nextId) {
      document.getElementById(prevId).addEventListener('click', () => {
        data.currentMonth = shiftMonth(data.currentMonth, -1);
        saveData();
        renderAll();
      });
      document.getElementById(nextId).addEventListener('click', () => {
        data.currentMonth = shiftMonth(data.currentMonth, 1);
        saveData();
        renderAll();
      });
    }
    bindMonthNav('prevMonth1', 'nextMonth1');
    bindMonthNav('prevMonth2', 'nextMonth2');
    bindMonthNav('prevMonth3', 'nextMonth3');

    // Budget edit
    document.getElementById('editBudgetBtn').addEventListener('click', () => {
      editingBudget = !editingBudget;
      renderBudget();
    });

    // Export
    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `budget_backup_${data.currentMonth}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // Import
    const jsonFileInput = document.getElementById('jsonFileInput');
    document.getElementById('importBtn').addEventListener('click', () => {
      if (!confirm('选择本地 data.json 文件导入历史账单数据')) return;
      jsonFileInput.click();
    });

    jsonFileInput.addEventListener('change', () => {
      const file = jsonFileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const json = JSON.parse(e.target.result);
          if (!json.records || !Array.isArray(json.records)) {
            alert('JSON 格式不正确，缺少 records 数组');
            return;
          }
          const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
          const existingIds = new Set((existing.records || []).map(r => r.id));
          const newRecords = json.records.filter(r => !existingIds.has(r.id));
          const merged = {
            currentMonth: json.currentMonth || existing.currentMonth,
            monthlyBudgets: json.monthlyBudgets || existing.monthlyBudgets || { '01': 600, '02': 500, '03': 1500, '04': 400 },
            cat01Rollover: existing.cat01Rollover || 0,
            records: [...newRecords, ...(existing.records || [])]
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
          location.reload();
        } catch (err) {
          alert('JSON 解析失败：' + err.message);
        }
      };
      reader.readAsText(file);
    });

    // ──────────── Init ────────────
    switchTab('tabHome');
  </script>
</body>
</html>
